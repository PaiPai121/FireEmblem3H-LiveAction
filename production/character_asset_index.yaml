version: 1
updated: 2026-07-01
status_definitions:
  missing: 尚未生成任何可用视觉资产
  text_only: 只有文字描述或提示词
  legacy_ep01: EP01 早期资产，可临时使用但未进入长期规范
  legacy_overaged: 已有候选图，但学院篇年龄感偏成熟，需要重做
  candidates_v2: 已按新版规范生成候选图，需要人工审片后决定是否选用
  candidates_v3: 已按更年轻化规范生成候选图，需要人工审片后决定是否选用
  needs_regeneration: 需要按新版规范重新生成
  ready_for_ep01: 可用于 EP01 MVP
  candidates_v1: 已生成第一轮候选图，需要人工审片后决定是否选用
  concept_v1: 已生成第一轮概念图，需要后续细化
  candidates_v4: 已按问题修正生成的第四轮候选图，需要人工审片后决定是否选用
  concept_v2: 已生成第二轮细化概念图，可作为主参考继续深化
global_rules:
  academy:
    age_range: 15-18
    required_traits:
    - teenage student
    - youthful face
    - soft facial features
    - officer academy uniform
    negative_traits:
    - mature adult
    - veteran soldier
    - battle hardened
    - harsh jawline
    - heavy wrinkles
    - beard
    - stubble
    - military commander
  war:
    age_range: 20-23
    required_traits:
    - same identity anchors as academy version
    - more mature posture
    - faction-specific wartime costume
    - visible effect of five years of conflict
